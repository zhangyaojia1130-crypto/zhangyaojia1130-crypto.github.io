-shell {\\n        display: flex;\\n        align-items: center;\\n        padding: 14px 12px;\\n      }\\n\\n      .field-prefix,\\n      .field-suffix {\\n        font-size: 16px;\\n        line-height: 150%;\\n        color: var(--muted-light);\\n      }\\n\\n      .field-prefix {\\n        margin-right: 4px;\\n      }\\n\\n      .field-suffix {\\n        margin-left: 4px;\\n      }\\n\\n      .field-shell input[type=\\\"number\\\"] {\\n        width: 100%;\\n        border: 0;\\n        outline: none;\\n        background: transparent;\\n        color: var(--text);\\n        font-size: 16px;\\n        line-height: 150%;\\n      }\\n\\n      .stack {\\n        display: grid;\\n        gap: 32px;\\n      }\\n\\n      .summary-list {\\n        display: grid;\\n        gap: 12px;\\n        margin-top: 24px;\\n      }\\n\\n      .summary-row {\\n        display: flex;\\n        align-items: center;\\n        justify-content: space-between;\\n        gap: 16px;\\n        padding: 14px 16px;\\n      }\\n\\n      .summary-row.highlight {\\n        border-color: rgba(136, 0, 255, 0.35);\\n        background: linear-gradient(135deg, rgba(0, 255, 255, 0.1) 0%, rgba(136, 0, 255, 0.08) 52%, rgba(255, 0, 221, 0.1) 100%);\\n      }\\n\\n      .summary-label {\\n        font-size: 14px;\\n        line-height: 150%;\\n        color: rgba(0, 19, 28, 0.75);\\n      }\\n\\n      .summary-value {\\n        font-size: 18px;\\n        font-weight: 600;\\n        line-height: 125%;\\n      }\\n\\n      .snapshot-head {\\n        display: flex;\\n        align-items: center;\\n        justify-content: space-between;\\n        gap: 16px;\\n      }\\n\\n      .snapshot-icon {\\n        width: 40px;\\n        height: 40px;\\n        border: 1px solid var(--aqua);\\n        background: linear-gradient(135deg, rgba(0, 255, 255, 0.15) 0%, rgba(136, 0, 255, 0.1) 52%, rgba(255, 0, 221, 0.15) 100%);\\n      }\\n\\n      .bars {\\n        display: grid;\\n        gap: 20px;\\n        margin-top: iv\u003e\\n              \u003c/div\u003e\\n              \u003ch1\u003eEvaluate the business impact of AI voice automation across travel commerce operations.\u003c/h1\u003e\\n              \u003cp class=\\\"body-copy\\\"\u003e\\n                Model operational savings, incremental revenue, and payback period using a clean, executive-ready\\n                simulator aligned to DerbySoft’s corporate visual language.\\n              \u003c/p\u003e\\n              \u003cdiv class=\\\"hero-actions\\\"\u003e\\n                \u003cbutton class=\\\"btn btn-dark\\\" type=\\\"button\\\"\u003eExport business case\u003c/button\u003e\\n                \u003cbutton class=\\\"btn btn-accent\\\" type=\\\"button\\\"\u003eCompare scenarios\u003c/button\u003e\\n              \u003c/div\u003e\\n            \u003c/div\u003e\\n\\n            \u003cdiv class=\\\"stats-grid\\\" id=\\\"statsGrid\\\"\u003e\u003c/div\u003e\\n          \u003c/div\u003e\\n        \u003c/header\u003e\\n\\n        \u003cmain class=\\\"main-grid\\\"\u003e\\n          \u003csection class=\\\"panel\\\"\u003e\\n            \u003cdiv class=\\\"section-head\\\"\u003e\\n              \u003cdiv\u003e\\n                \u003ch2\u003eOperational assumptions\u003c/h2\u003e\\n                \u003cp class=\\\"section-subcopy\\\"\u003e\\n                  Adjust the primary drivers to reflect contact center volume, automation performance, and platform cost.\\n                \u003c/p\u003e\\n              \u003c/div\u003e\\n              \u003cbutton class=\\\"btn btn-aqua\\\" type=\\\"button\\\" id=\\\"resetBtn\\\"\u003eReset inputs\u003c/button\u003e\\n            \u003c/div\u003e\\n\\n            \u003cdiv class=\\\"slider-group\\\" id=\\\"sliderGroup\\\"\u003e\u003c/div\u003e\\n            \u003cdiv class=\\\"field-grid\\\" id=\\\"fieldGrid\\\"\u003e\u003c/div\u003e\\n          \u003c/section\u003e\\n\\n          \u003csection class=\\\"stack\\\"\u003e\\n            \u003cdiv class=\\\"panel\\\"\u003e\\n              \u003ch3\u003eValue summary\u003c/h3\u003e\\n              \u003cp class=\\\"section-subcopy\\\"\u003e\\n                The simulator combines labor efficiency and revenue contribution into a transparent financial view.\\n              \u003c/p\u003e\\n              \u003cdiv class=\\\"summary-list\\\" id=\\\"summaryList\\\"\u003e\u003c/div\u003e\\n            \u003c/div\u003e\\n\\n            \u003cdiv class=\\\"panel\\\"\u003e\\n              \u003cdiv class=\\\"snapshot-head\\\"\u003e\\n                \u003cdiv\u003e\\n                  \u003ch3\u003eScenario snapshot\u003c/h3\u003e\\n                  \u003cp class=\\\"section-subcopy\\\"\u003e\\n                    A simplified distribution of where value is created in the current scenario.\\n                  \u003c/p\u003e\\n                \u003c/div\u003e\\n                \u003cdiv class=\\\"snapshot-icon\\\" aria-hidden=\\\"true\\\"\u003e\u003c/div\u003e\\n              \u003c/div\u003e\\n              \u003cdiv class=\\\"bars\\\" id=\\\"bars\\\"\u003e\u003c/div\u003e\\n            \u003c/div\u003e\\n\\n            \u003cdiv class=\\\"note-card\\\"\u003e\\n              \u003ch4\u003eRecommended interpretation\u003c/h4\u003e\\n              \u003cp class=\\\"note-copy\\\"\u003e\\n                Stronger automation and containment increase labor savings, while qualified-call conversion lift improves\\n                revenue contribution. Use the model to align commercial, operations, and finance stakeholders on a shared\\n                ROI baseline.\\n              \u003c/p\u003e\\n            \u003c/div\u003e\\n          \u003c/section\u003e\\n        \u003c/main\u003e\\n      \u003c/div\u003e\\n    \u003c/div\u003e\\n\\n    \u003cscript\u003e\\n      const defaults = {\\n        monthlyCalls: 18000,\\n        avgHandleTime: 6.5,\\n        agentHourlyCost: 18,\\n        automationRate: 42,\\n        containmentRate: 78,\\n        implementationCost: 45000,\\n        monthlyPlatformCost: 9500,\\n        csatLift: 8,\\n        conversionLift: 3.2,\\n        revenuePerConvertedBooking: 28,\\n        qualifiedCallsPerMonth: 3200,\\n      };\\n\\n      const state = { ...defaults };\\n\\n      const sliderFields = [\\n        { key: 'monthlyCalls', label: 'Monthly inbound calls', min: 1000, max: 50000, step: 500, suffix: 'calls' },\\n        { key: 'avgHandleTime', label: 'Average handle time', min: 1, max: 15, step: 0.5, suffix: 'minutes' },\\n        { key: 'agentHourlyCost', label: 'Agent hourly cost', min: 8, max: 40, step: 1, prefix: '$' },\\n        { key: 'automationRate', label: 'AI automation rate', min: 5, max: 95, step: 1, suffix: '%' },\\n        { key: 'containmentRate', label: 'Containment rate', min: 10, max: 95, step: 1, suffix: '%' },\\n        { key: 'monthlyPlatformCost', label: 'Monthly platform cost', min: 1000, max: 25000, step: 250, prefix: '$' },\\n      ];\\n\\n      const metricFields = [\\n        { key: 'implementationCost', label: 'Implementation cost', prefix: '$', step: '1' },\\n        { key: 'qualifiedCallsPerMonth', label: 'Qualified calls / month', step: '1' },\\n        { key: 'revenuePerConvertedBooking', label: 'Revenue per converted booking', prefix: '$', step: '1' },\\n        { key: 'conversionLift', label: 'Conversion lift', suffix: '%', step: '0.1' },\\n      ];\\n\\n      const statsGrid = document.getElementById('statsGrid');\\n      const sliderGroup = document.getElementById('sliderGroup');\\n      const fieldGrid = document.getElementById('fieldGrid');\\n      const summaryList = document.getElementById('summaryList');\\n      const bars = document.getElementById('bars');\\n      const resetBtn = document.getElementById('resetBtn');\\n\\n      function formatCurrency(value) {\\n        return new Intl.NumberFormat('en-US', {\\n          style: 'currency',\\n          currency: 'USD',\\n          maximumFractionDigits: 0,\\n        }).format(value);\\n      }\\n\\n      function formatNumber(value) {\\n        return new Intl.NumberFormat('en-US', {\\n          maximumFractionDigits: 0,\\n        }).format(value);\\n      }\\n\\n      function formatPercent(value) {\\n        return Number(value).toFixed(1) + '%';\\n      }\\n\\n      function calculate() {\\n        const monthlyLaborHours = state.monthlyCalls * (state.avgHandleTime / 60);\\n        const monthlyLaborCost = monthlyLaborHours * state.agentHourlyCost;\\n        const automatedCalls = state.monthlyCalls * (state.automationRate / 100);\\n        const containedCalls = automatedCalls * (state.containmentRate / 100);\\n        const hoursSaved = containedCalls * (state.avgHandleTime / 60);\\n        const laborSavings = hoursSaved * state.agentHourlyCost;\\n        const incrementalBookings = state.qualifiedCallsPerMonth * (state.conversionLift / 100);\\n        const incrementalRevenue = incrementalBookings * state.revenuePerConvertedBooking;\\n        const totalMonthlyBenefit = laborSavings + incrementalRevenue;\\n        const netMonthlyImpact = totalMonthlyBenefit - state.monthlyPlatformCost;\\n        const annualNetBenefit = netMonthlyImpact * 12 - state.implementationCost;\\n        const roi = state.implementationCost === 0 ? 0 : (annualNetBenefit / state.implementationCost) * 100;\\n        const paybackMonths = netMonthlyImpact \u003e 0 ? state.implementationCost / netMonthlyImpact : 0;\\n\\n        return {\\n          monthlyLaborCost,\\n          laborSavings,\\n          incrementalRevenue,\\n          totalMonthlyBenefit,\\n          netMonthlyImpact,\\n          annualNetBenefit,\\n          roi,\\n          paybackMonths,\\n          containedCalls,\\n        };\\n      }\\n\\n      function renderStats(metrics) {\\n        const stats = [\\n          {\\n            label: 'Annual Net Benefit',\\n            value: formatCurrency(metrics.annualNetBenefit),\\n            hint: 'After platform and implementation costs',\\n          },\\n          {\\n            label: 'ROI',\\n            value: fo ge-meta\\\"\u003e\\n                  \u003cspan\u003e${field.prefix || ''}${field.min}${field.suffix ? ' ' + field.suffix : ''}\u003c/span\u003e\\n                  \u003cspan\u003e${field.prefix || ''}${field.max}${field.suffix ? ' ' + field.suffix : ''}\u003c/span\u003e\\n                \u003c/div\u003e\\n              \u003c/div\u003e\\n            `\\n          )\\n          .join('');\\n\\n        sliderGroup.querySelectorAll('input[type=\\\"range\\\"]').forEach((input) =\u003e {\\n          input.addEventListener('input', (event) =\u003e {\\n            const key = event.target.dataset.key;\\n            state[key] = Number(event.target.value);\\n            render();\\n          });\\n        });\\n      }\\n\\n      function renderFields() {\\n        fieldGrid.innerHTML = metricFields\\n          .map(\\n            (field) =\u003e `\\n              \u003clabel\u003e\\n                \u003cspan class=\\\"field-label-small\\\"\u003e${field.label}\u003c/span\u003e\\n                \u003cspan class=\\\"field-shell\\\"\u003e\\n                  ${field.prefix ? `\u003cspan class=\\\"field-prefix\\\"\u003e${field.prefix}\u003c/span\u003e` : ''}\\n                  \u003cinput\\n                    type=\\\"number\\\"\\n                    data-key=\\\"${field.key}\\\"\\n                    step=\\\"${field.step}\\\"\\n                    value=\\\"${state[field.key]}\\\"\\n                  /\u003e\\n                  ${field.suffix ? `\u003cspan class=\\\"field-suffix\\\"\u003e${field.suffix}\u003c/span\u003e` : ''}\\n                \u003c/span\u003e\\n              \u003c/label\u003e\\n            `\\n          )\\n          .join('');\\n\\n        fieldGrid.querySelectorAll('input[type=\\\"number\\\"]').forEach((input) =\u003e {\\n          input.addEventListener('input', (event) =\u003e {\\n            const key = event.target.dataset.key;\\n            state[key] = Number(event.target.value || 0);\\n            render();\\n          });\\n        });\\
